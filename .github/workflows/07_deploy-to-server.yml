name: Deploy to Server - github-actions-prod-server

on:
  workflow_call:

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to PROD Server and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Deploying latest Docker image on PROD server..."
            mkdir devops
