name: DevSecOps end to end Pipeline

on:
  workflow_dispatch:

jobs:
  # CI (Continuous Integration with Security Scanning)
  code-quality:
    uses: ./.github/workflows/01_code-quality.yml

  secrets-scan:
    uses: ./.github/workflows/02_secrets-scan.yml

  dependency-scan:
    uses: ./.github/workflows/03_dependency-scan.yml

  docker-lint:
    uses: ./.github/workflows/04_docker-lint.yml

  # Build once the security scans are successful, then push to Docker Hub
  docker-build-push:
    needs: [code-quality, secrets-scan, dependency-scan, docker-lint]
    uses: ./.github/workflows/06_docker-build-push.yml
    secrets: inherit

  trivy:
    needs: docker-build-push
    uses: ./.github/workflows/05_docker-image-scan.yml
    secrets: inherit
