name: DevSecOps end to end Pipeline

on:
  workflow_dispatch:

jobs:
  code-quality:
    uses: ./.github/workflows/01_code-quality.yml

  secrets-scan:
    needs: code-quality
    uses: ./.github/workflows/02_secrets-scan.yml

  dependency-scan:
    needs: secrets-scan
    uses: ./.github/workflows/03_dependency-scan.yml

  docker-lint:
    needs: dependency-scan
    uses: ./.github/workflows/04_docker-lint.yml

  docker-image-scan:
    needs: docker-lint
    uses: ./.github/workflows/05_docker-image-scan.yml

  docker-build-push:
    needs: docker-image-scan
    uses: ./.github/workflows/06_docker-build-push.yml

  deploy-to-server:
    needs: docker-build-push
    uses: ./.github/workflows/07_deploy-to-server.yml
